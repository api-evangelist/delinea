aid: delinea
name: Delinea
description: Delinea is a privileged access management (PAM) platform providing REST APIs for Secret Server, DevOps Secrets Vault, Privilege Manager, and Cloud Suite. It enables organizations to manage, rotate, and audit privileged credentials, sessions, and access policies across on-premises and cloud infrastructure.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/delinea/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Privileged Access Management
  - PAM
  - Secrets Management
  - Identity Security
  - DevOps
  - Cybersecurity
apis:
  - aid: delinea:secret-server-api
    name: Secret Server REST API
    description: REST API for Delinea Secret Server enabling programmatic management of privileged credentials, secrets, folders, permissions, and session recording. Supports Bearer token, OAuth 2.0, and Windows Integrated Authentication.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.delinea.com/online-help/secret-server/api-scripting/rest-api/index.htm
    baseURL: https://your-secret-server-instance/api/v1
    tags:
      - Secrets
      - Credentials
      - Privileged Access
      - REST
    properties:
      - type: Documentation
        url: https://docs.delinea.com/online-help/secret-server/api-scripting/rest-api/index.htm
      - type: APIReference
        url: https://docs.delinea.com/online-help/secret-server/api-scripting/rest-api/rest-api-reference-download/index.htm
      - type: Authentication
        url: https://docs.delinea.com/online-help/platform-api/secret-server.htm
      - type: Examples
        url: https://docs.delinea.com/online-help/secret-server/api-scripting/rest-api/examples/index.htm
      - type: DeveloperResources
        url: https://docs.delinea.com/online-help/secret-server/api-scripting/developer-resources/index.htm
    contact:
      - FN: Delinea Support
        url: https://delinea.com/support
  - aid: delinea:devops-secrets-vault-api
    name: DevOps Secrets Vault API
    description: REST API for Delinea DevOps Secrets Vault (DSV), a cloud-native secrets management service for DevOps pipelines. Provides endpoints for secrets CRUD, token management, role-based access control, encryption as a service, PKI, and SIEM integration.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.delinea.com/online-help/devops-secrets-vault/start.htm
    baseURL: https://secretsvaultcloud.com/v1
    tags:
      - DevOps
      - Secrets Management
      - Cloud
      - CI/CD
    properties:
      - type: Documentation
        url: https://docs.delinea.com/online-help/devops-secrets-vault/start.htm
      - type: APIReference
        url: https://dsv.secretsvaultcloud.com/api
      - type: SDKs
        url: https://docs.delinea.com/online-help/devops-secrets-vault/developer-resources/sdk.htm
      - type: PythonSDK
        url: https://github.com/DelineaXPM/python-dsv-sdk
      - type: GoSDK
        url: https://github.com/DelineaXPM/dsv-sdk-go
      - type: JavaSDK
        url: https://github.com/DelineaXPM/dsv-sdk-java
    contact:
      - FN: Delinea Support
        url: https://delinea.com/support
  - aid: delinea:platform-api
    name: Delinea Platform API
    description: Platform-level REST API for Delinea's unified cloud platform enabling OAuth 2.0 authentication, role and group management, service account operations, and integration with Secret Server through the platform layer.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.delinea.com/online-help/delinea-platform/api/index.htm
    baseURL: https://your-tenant.delinea.app/api
    tags:
      - Platform
      - Identity
      - OAuth
      - Access Control
    properties:
      - type: Documentation
        url: https://docs.delinea.com/online-help/delinea-platform/api/index.htm
      - type: APIReference
        url: https://docs.delinea.com/online-help/platform-api/secret-server.htm

name: Delinea Plans and Pricing
description: Pricing tiers and plans for the Delinea privileged access management platform, covering Secret Server, DevOps Secrets Vault, Privilege Manager, and Cloud Suite products.
url: https://delinea.com/products/delinea-platform-bundles
contact: https://delinea.com/request-a-quote
plans:
  - name: Essentials
    description: Core privileged access management for small to mid-size teams, including secure vault, password management, and session monitoring.
    type: paid
    quote: true
    features:
      - Secure vault and password management
      - Privileged account discovery
      - Session monitoring and recording
      - Mobile apps
      - Up to 15 admins and 15 business users
      - Up to 4 engines
      - 2TB storage
      - REST API access
  - name: Standard
    description: Expanded PAM capabilities including MFA, privilege elevation, identity federation, and Active Directory bridging for medium enterprises.
    type: paid
    quote: true
    features:
      - All Essentials features
      - MFA on individual credentials
      - Privilege elevation
      - Identity federation for Active Directory
      - MFA on login and privilege elevation
      - AD bridging
      - Group policy translation
      - Continuous discovery
      - No engine or site limit
      - 15 servers included
      - 4TB storage
      - REST API access
  - name: Enterprise
    description: Full-featured PAM platform with advanced DevOps integration, service account governance, workstation management, and resilient secrets for large organizations.
    type: paid
    quote: true
    features:
      - All Standard features
      - Advanced DevOps integration
      - Extensive privileged account discovery
      - Credential and approval workflows
      - Service account governance
      - Identity federation for any IDP
      - Workstation and endpoint management
      - Resilient secrets
      - 30 admins and 30 business users
      - 30 servers and 30 workstations included
      - 6TB storage
      - REST API access
      - DevOps Secrets Vault integration
  - name: Trial
    description: Free 30-day trial of Secret Server with full API access to evaluate privileged access management capabilities.
    type: free
    trial: true
    duration: 30 days
    features:
      - Full Secret Server access
      - REST API access
      - SOAP API access
      - All core PAM features
notes:
  - Pricing is custom quoted; Delinea does not publish per-seat rates publicly.
  - Median buyer price is approximately $19,705 per year per third-party data (Vendr).
  - Contract values range from approximately $3,226 to $44,501 annually.
  - Products include Secret Server, Privilege Manager, DevOps Secrets Vault, Cloud Suite, and Privileged Behavior Analytics.
  - Cloud platform uptime SLA is 99.995%.
